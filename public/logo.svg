<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="fieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ADFF2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left side - Field with tractor -->
  <path d="M 50 80 Q 30 100 50 150 L 80 150 Q 80 100 60 80 Z" fill="url(#fieldGradient)" stroke="#8BC863" stroke-width="2"/>
  
  <!-- Tractor silhouette -->
  <g transform="translate(55, 120)">
    <!-- Tractor body -->
    <rect x="-15" y="-5" width="20" height="8" fill="#333" rx="2"/>
    <!-- Tractor cabin -->
    <circle cx="5" cy="-8" r="4" fill="#444"/>
    <!-- Wheels -->
    <circle cx="-10" cy="5" r="4" fill="#222"/>
    <circle cx="10" cy="5" r="3" fill="#222"/>
  </g>
  
  <!-- Right side - Leaves -->
  <g transform="translate(120, 70)">
    <!-- Top leaf -->
    <ellipse cx="0" cy="-20" rx="18" ry="30" fill="url(#leafGradient)" stroke="#1F4221" stroke-width="1.5" transform="rotate(-25)"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-40" x2="0" y2="0" stroke="#1F4221" stroke-width="1.5" transform="translate(0 -20) rotate(-25)"/>
    
    <!-- Bottom left leaf -->
    <ellipse cx="-8" cy="15" rx="20" ry="32" fill="url(#leafGradient)" stroke="#1F4221" stroke-width="1.5" transform="rotate(15)"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-38" x2="0" y2="0" stroke="#1F4221" stroke-width="1.5" transform="translate(-8 15) rotate(15)"/>
    
    <!-- Bottom right leaf -->
    <ellipse cx="10" cy="20" rx="18" ry="30" fill="url(#leafGradient)" stroke="#1F4221" stroke-width="1.5" transform="rotate(-10)"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-35" x2="0" y2="0" stroke="#1F4221" stroke-width="1.5" transform="translate(10 20) rotate(-10)"/>
  </g>
  
  <!-- Center divider line with glow -->
  <line x1="95" y1="50" x2="95" y2="160" stroke="#8BC863" stroke-width="2" opacity="0.6"/>
</svg>
