<!-- Professional YantraMitra AI Logo -->
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" width="160" height="160">
  <defs>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D984;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F4221;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="150" cy="150" r="145" fill="white" filter="url(#shadow)"/>
  
  <!-- Left side - Field with tractor -->
  <g filter="url(#shadow)">
    <path d="M 80 120 Q 60 150 80 220 L 130 220 Q 130 150 110 120 Z" fill="url(#fieldGrad)" stroke="none"/>
    
    <!-- Tractor -->
    <g transform="translate(95, 175)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#1a1a1a"/>
      <circle cx="8" cy="3" r="3" fill="#333"/>
      <circle cx="-8" cy="3" r="4" fill="#222"/>
      <circle cx="0" cy="-12" r="3" fill="#444"/>
    </g>
  </g>
  
  <!-- Right side - Leaves -->
  <g filter="url(#shadow)">
    <!-- Top leaf -->
    <ellipse cx="195" cy="110" rx="22" ry="40" fill="url(#leafGrad)" stroke="#1F4221" stroke-width="1.5" transform="rotate(-30 195 110)"/>
    <line x1="195" y1="70" x2="195" y2="150" stroke="#1F4221" stroke-width="1.5" opacity="0.8" transform="rotate(-30 195 110)"/>
    
    <!-- Bottom left leaf -->
    <ellipse cx="170" cy="180" rx="24" ry="42" fill="url(#leafGrad)" stroke="#1F4221" stroke-width="1.5" transform="rotate(20 170 180)"/>
    <line x1="170" y1="138" x2="170" y2="222" stroke="#1F4221" stroke-width="1.5" opacity="0.8" transform="rotate(20 170 180)"/>
    
    <!-- Bottom right leaf -->
    <ellipse cx="210" cy="190" rx="22" ry="40" fill="url(#leafGrad)" stroke="#1F4221" stroke-width="1.5" transform="rotate(-10 210 190)"/>
    <line x1="210" y1="150" x2="210" y2="230" stroke="#1F4221" stroke-width="1.5" opacity="0.8" transform="rotate(-10 210 190)"/>
  </g>
  
  <!-- Center divider -->
  <line x1="150" y1="90" x2="150" y2="230" stroke="#8BC863" stroke-width="2.5" opacity="0.7"/>
</svg>
